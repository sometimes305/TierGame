<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>みんなでティア表ゲーム</title>
    <link rel="stylesheet" href="style.css?v=20260527-auto-topics" />
    <script src="https://cdn.gravity.place/fe/sdk/index-1.0.2.min.js"></script>
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <span class="topbar-spacer" aria-hidden="true"></span>
        <div class="title-block">
          <h1 id="headerPhaseDisplay">みんなでティア表ゲーム</h1>
          <div id="onlineBadge" class="online-badge">オフライン</div>
        </div>
        <button type="button" class="topbar-button" id="helpButton">遊び方</button>
      </header>

      <main class="game-layout">
        <section class="board-area" aria-labelledby="boardTitle">
          <div class="topic-row">
            <div class="topic-box">
              <p class="label">お題</p>
              <h2 id="topicDisplay">未設定</h2>
            </div>
            <div class="score-strip" aria-label="ゲーム状況">
              <div>
                <span>連続</span>
                <strong id="streakValue">0</strong>
              </div>
              <div>
                <span>連続正解目標</span>
                <strong id="goalValue">5</strong>
              </div>
              <div>
                <span>ラウンド</span>
                <strong id="roundValue">1</strong>
              </div>
            </div>
          </div>

          <div class="tier-board" id="tierBoard" aria-labelledby="boardTitle">
            <h2 id="boardTitle" class="sr-only">ティア表</h2>
          </div>
        </section>

        <aside class="control-panel" aria-labelledby="panelTitle">
          <div class="panel-head">
            <p class="label">操作</p>
            <h2 id="panelTitle">ロビー</h2>
            <div class="phase-pill" id="phaseDisplay">ロビー</div>
          </div>
          <div id="panelBody"></div>
        </aside>
      </main>

      <section class="room-panel hidden" id="roomPanel" aria-label="ルーム情報">
        <div>
          <p class="label">ルーム</p>
          <strong id="activeRoomId">未入室</strong>
        </div>
        <div>
          <p class="label">参加者</p>
          <div class="participant-list" id="participantList"></div>
        </div>
        <button type="button" class="danger" id="exitRoomButton">退出</button>
      </section>

      <section class="chat-panel" id="chatPanel" aria-label="チャット">
        <div class="chat-resize-handle" id="chatResizeHandle" role="separator" aria-label="チャット欄の高さ" aria-orientation="horizontal" tabindex="0">
          <span></span>
        </div>
        <div class="chat-log" id="chatLog"></div>
        <form class="chat-form" id="chatForm">
          <input id="chatInput" maxlength="120" placeholder="チャット" autocomplete="off" />
          <button type="submit">送信</button>
        </form>
      </section>
    </div>

    <template id="setupTemplate">
      <form class="stack" id="setupForm">
        <section class="game-setup-fields">
          <div class="host-config-status" id="hostConfigStatus">ホストがルールを設定中...</div>
          <fieldset class="segmented">
            <legend>お題生成</legend>
            <label>
              <input type="radio" name="topicMode" value="auto" checked />
              <span>自動生成</span>
            </label>
            <label>
              <input type="radio" name="topicMode" value="manual" />
              <span>手動入力</span>
            </label>
          </fieldset>

          <label>
            <span>お題</span>
            <input id="topicInput" maxlength="40" placeholder="例: 強そうな動物" />
          </label>

          <div class="grid-2">
            <label>
              <span>スタートワード</span>
              <input id="startWordInput" maxlength="20" placeholder="例: オオカミ" />
            </label>
            <label>
              <span>初期ランク</span>
              <select id="initialRankInput">
                <option value="A">A</option>
                <option value="B" selected>B</option>
                <option value="C">C</option>
              </select>
            </label>
          </div>

          <div class="grid-2">
            <label>
              <span>連続正解目標</span>
              <input id="goalInput" type="number" min="1" max="20" value="5" required />
            </label>
            <label>
              <span>ヒント総数</span>
              <select id="hintCountInput">
                <option value="0">なし</option>
                <option value="1">1回</option>
                <option value="2">2回</option>
                <option value="3" selected>3回</option>
                <option value="5">5回</option>
              </select>
            </label>
          </div>

          <div class="button-row">
            <button type="submit" class="primary">ゲーム開始</button>
          </div>
        </section>

        <section class="online-panel" aria-label="オンライン">
          <div class="online-profile">
            <div class="avatar" id="profileAvatar">名</div>
            <div>
              <span>プレイヤー</span>
              <strong id="displayUsername">名無し</strong>
            </div>
          </div>
          <div class="online-screen" data-online-screen="home">
            <button type="button" id="goCreateRoomButton" class="primary large-menu-button">部屋を作る</button>
            <button type="button" id="goJoinRoomButton" class="large-menu-button">部屋に参加する</button>
          </div>
          <div class="online-screen hidden" data-online-screen="create">
            <div class="screen-title-row">
              <strong>部屋を作る</strong>
              <button type="button" class="ghost small-button" data-online-back>戻る</button>
            </div>
            <label>
              <span>名前</span>
              <input id="username" maxlength="12" placeholder="名前を入力" />
            </label>
            <div class="grid-2">
              <label>
                <span>最大人数</span>
                <select id="roomCapacity">
                  <option value="2">2人</option>
                  <option value="3">3人</option>
                  <option value="4" selected>4人</option>
                  <option value="6">6人</option>
                  <option value="8">8人</option>
                </select>
              </label>
              <label>
                <span>公開範囲</span>
                <select id="roomPermission">
                  <option value="0" selected>公開</option>
                  <option value="1">非公開</option>
                </select>
              </label>
            </div>
            <button type="button" id="createRoomButton" class="primary large-menu-button">部屋を作成</button>
          </div>
          <div class="online-screen hidden" data-online-screen="join">
            <div class="screen-title-row">
              <strong>部屋に参加する</strong>
              <button type="button" class="ghost small-button" data-online-back>戻る</button>
            </div>
            <label>
              <span>名前</span>
              <input id="usernameJoin" maxlength="12" placeholder="名前を入力" />
            </label>
            <div class="join-row">
              <input id="joinRoomInput" maxlength="32" placeholder="ルームID" />
              <button type="button" id="joinRoomButton">参加</button>
            </div>
            <div class="room-list-title">公開ルーム</div>
            <button type="button" id="refreshRoomsButton">更新</button>
            <div id="roomList" class="room-list"></div>
          </div>
          <div id="onlineStatus" class="online-status">オフライン</div>
        </section>
        <section class="old-online-panel" hidden>
          <label>
            <span>名前</span>
            <input id="usernameOld" maxlength="12" placeholder="名前を入力" />
          </label>
        </section>
      </form>
    </template>

    <script src="app.js?v=20260527-auto-topics"></script>
    <script src="online.js?v=20260527-auto-topics"></script>
  </body>
</html>
